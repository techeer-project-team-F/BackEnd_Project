# CodeRabbit 설정 파일
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: "ko-KR"

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  path_filters:
    - "!build/**"
    - "!.gradle/**"
    - "!gradle/**"
    - "!**/*.class"
    - "!docker/**"
    - "!Dockerfile"
    - "!docker-compose.yml"
    - "!cookies.txt"

  path_instructions:
    - path: "src/main/java/**/entity/*.java"
      instructions: |
        JPA 엔티티 코드를 검토합니다.
        - 연관관계 FetchType이 LAZY인지 확인 (특히 @ManyToOne, @OneToMany)
        - @Column 제약조건(nullable, length)이 DB 스키마와 일치하는지 확인
        - equals/hashCode가 id 기반으로 올바르게 구현되어 있는지 확인
        - 양방향 연관관계 시 편의 메서드 존재 여부 확인
        - Soft Delete 패턴 사용 시 isDeleted 필드 및 관련 메서드 일관성 확인

    - path: "src/main/java/**/repository/*.java"
      instructions: |
        Spring Data JPA Repository 코드를 검토합니다.
        - 루프 내에서 호출될 가능성이 있는 메서드에 N+1 발생 위험이 있는지 확인
        - 목록 조회 쿼리에 JOIN FETCH 또는 @EntityGraph가 적용되어 있는지 확인
        - 대량 조회 시 IN절(@Param + List) 활용 여부 확인
        - LIKE %:param% 패턴의 풀스캔 위험 확인
        - JPQL의 엔티티명/필드명 오타 확인 (런타임 오류 원인)
        - 페이지네이션 쿼리에 ORDER BY가 포함되어 있는지 확인

    - path: "src/main/java/**/service/*.java"
      instructions: |
        Service 레이어 코드를 검토합니다.
        - 클래스 레벨 @Transactional(readOnly = true) 선언 여부 확인
        - 쓰기 메서드에 @Transactional 오버라이드 여부 확인
        - 루프(stream/for) 내부에서 Repository 메서드를 반복 호출하는 N+1 패턴 확인
        - 동일 메서드를 루프 안에서 중복 호출하는 경우 확인 (ex. getMember()를 매 iteration마다 호출)
        - 비즈니스 예외는 BusinessException + ErrorCode 패턴을 사용하는지 확인

    - path: "src/main/java/**/controller/*.java"
      instructions: |
        Controller 레이어 코드를 검토합니다.
        - 비즈니스 로직이 Controller에 직접 작성되지 않았는지 확인
        - @Valid / @Validated를 통한 입력 검증 여부 확인
        - 인증이 필요한 엔드포인트에 @AuthenticationPrincipal 또는 Security 설정이 적용되어 있는지 확인
        - 응답 형식이 공통 응답 포맷(ApiResponse 등)을 따르는지 확인

    - path: "src/main/java/**/global/jwt/*.java"
      instructions: |
        JWT 관련 코드를 검토합니다.
        - ExpiredJwtException을 빈 catch로 무시하지 않고 명시적 401 응답을 반환하는지 확인
        - 토큰 검증 로직에서 예외가 적절히 처리되는지 확인
        - 민감한 정보(비밀번호 등)가 토큰 payload에 포함되지 않는지 확인

    - path: "src/main/java/**/global/redis/*.java"
      instructions: |
        Redis 관련 코드를 검토합니다.
        - hasKey → delete 처럼 2단계 비원자 연산 대신 delete() 반환값을 활용하는지 확인
        - TTL 설정 없이 키를 저장하는 경우 메모리 누수 위험 확인

    - path: "src/main/java/**/dto/**/*.java"
      instructions: |
        DTO 코드를 검토합니다.
        - 엔티티를 직접 반환하지 않고 DTO로 변환하는지 확인
        - 정적 팩토리 메서드(of, from)를 일관되게 사용하는지 확인
        - 불필요한 필드가 외부에 노출되지 않는지 확인

chat:
  auto_reply: true
