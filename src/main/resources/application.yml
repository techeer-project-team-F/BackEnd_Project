spring:
  profiles:
    active: local

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        access-key: ${AWS_ACCESS_KEY:local}
        secret-key: ${AWS_SECRET_KEY:local}
      s3:
        bucket: ${AWS_S3_BUCKET:local-bucket}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000      # 1시간
  refresh-expiration: 604800000   # 7일

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  default-consumes-media-type: application/json

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/callback/google}

aladin:
  api:
    ttbkey: ${ALADIN_API_KEY}
    version: "20131101"